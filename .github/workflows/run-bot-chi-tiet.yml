name: Chạy Bot Chi Tiết BĐS Sa Pa
on:
  workflow_dispatch: {} # Nhận lệnh chạy thủ công hoặc từ đồng hồ báo thức cron-job.org

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Tối ưu tốc độ cho những lần chạy sau

      - name: Cài đặt thư viện hệ thống và Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Thực thi Bot Chi Tiết
        run: python bot_chi_tiet_bds.py
        env:
          PYTHONUNBUFFERED: "1" # Dòng quan trọng nhất để xả log trực tiếp!
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
