name: Chạy Bot Việc Làm 24h
on:
  workflow_dispatch: {} 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests beautifulsoup4 supabase curl_cffi playwright playwright-stealth
          playwright install chromium --with-deps

      - name: Thực thi Bot Việc Làm
        run: python bot_vieclam24h.py
        env:
          PYTHONUNBUFFERED: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
