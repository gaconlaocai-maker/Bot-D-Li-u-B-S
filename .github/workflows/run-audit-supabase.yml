name: Run Supabase Data Audit

on:
  schedule:
    # Runs at 17:00 UTC (00:00 VN time) every Monday, Wednesday, Friday
    - cron: '0 17 * * 1,3,5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry Run (Only report, do not change data)'
        required: true
        default: 'true'
      apply_fixes:
        description: 'Apply Fixes (Will modify database!)'
        required: true
        default: 'false'
      use_ai:
        description: 'Use AI Audit (Groq)'
        required: false
        default: 'false'

jobs:
  audit-database:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Audit Bot
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        APPLY_FIXES: ${{ github.event.inputs.apply_fixes || 'false' }}
        USE_AI_AUDIT: ${{ github.event.inputs.use_ai || 'false' }}
        MAX_ROWS_PER_TABLE: 200
      run: |
        python bot_audit_supabase.py

    - name: Upload Audit Reports
      uses: actions/upload-artifact@v4
      with:
        name: audit-reports
        path: |
          audit_report.json
          audit_report.md
        retention-days: 7
