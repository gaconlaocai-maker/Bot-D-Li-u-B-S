name: Run Auto Duplicate Guard Patrol

on:
  schedule:
    # Cứ mỗi 6 tiếng chạy tự động một lần (vào 7h, 13h, 19h, 1h sáng giờ Việt Nam)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - both
          - patrol-active
          - patrol-publish
        default: 'both'
      mode:
        description: 'Patrol mode (threshold safety level)'
        required: true
        type: choice
        options:
          - safe-auto
          - aggressive-auto
        default: 'safe-auto'
      dry_run:
        description: 'Dry run (only report, no database changes)'
        required: true
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'
      limit:
        description: 'Maximum number of items to scan (0 = no limit)'
        required: true
        type: string
        default: '0'

jobs:
  run-patrol:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Patrol Bot
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        PATROL_LOG_DIR: ./reports
      run: |
        # Use inputs if manually triggered, otherwise defaults for production
        ACTION="${{ github.event.inputs.action || 'both' }}"
        MODE="${{ github.event.inputs.mode || 'safe-auto' }}"
        DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
        LIMIT="${{ github.event.inputs.limit || '0' }}"
        
        echo "Running Patrol with Action: $ACTION, Mode: $MODE, Dry Run: $DRY_RUN, Limit: $LIMIT"
        python run_patrol.py --action "$ACTION" --mode "$MODE" --dry-run "$DRY_RUN" --limit "$LIMIT"

    - name: Upload Patrol Reports
      uses: actions/upload-artifact@v4
      with:
        name: patrol-reports
        path: reports/patrol_execution_report.json
        retention-days: 7
